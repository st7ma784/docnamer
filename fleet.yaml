defaultNamespace: docnamer

helm:
  chart: ./helm/docnamer

  # ── ClusterOS domain contract ────────────────────────────────────────────
  # node-agent publishes the cluster's domain (and the Cloudflare-safe nginx
  # annotations needed to sit behind the cloudflared tunnel) into this
  # ConfigMap. It exists in both fleet-local and fleet-default on every
  # ClusterOS node, so this resolves regardless of which namespace the
  # GitRepo targets. The chart reads it as global.clusterDomain /
  # global.ingressAnnotations (see helm/docnamer/templates/_helpers.tpl) and
  # derives the host docnamer.<clusterDomain> automatically — no per-cluster
  # template substitution needed.
  valuesFrom:
    - configMapKeyRef:
        name: clusteros-helm-values
        namespace: fleet-local
        key: values.yaml

  # ── Base values ──────────────────────────────────────────────────────────
  values:
    image:
      repository: ghcr.io/st7ma784/docnamer
      tag: "0.1.0"

    llm:
      model: llama3.2

    ollama:
      model: llama3.2

    # Cloudflared terminates TLS at the edge and forwards plain HTTP to
    # ingress-nginx, so the ingress itself needs no TLS secret — just enable
    # it; the host is derived from global.clusterDomain above.
    ingress:
      enabled: true
      className: nginx

  # ── Secret values ────────────────────────────────────────────────────────
  # The chart deploys standalone with safe defaults: IMAP is left disabled
  # until configured, and AUTH_PASSWORD/IMAP_* are auto-generated or preserved
  # across upgrades by helm/docnamer/templates/secret.yaml.
  #
  # Fleet's helm.valuesFrom.secretKeyRef has no real "optional" support — if
  # the referenced Secret doesn't exist yet, the whole bundle fails to sync
  # ("Secrets ... not found"). So real credentials must NOT be wired through
  # Fleet. Once the app is deployed, set IMAP creds directly on the generated
  # Secret instead — secret.yaml preserves them across future `helm upgrade`
  # runs, the same way it already preserves AUTH_PASSWORD:
  #
  #   kubectl -n docnamer edit secret docnamer-env
