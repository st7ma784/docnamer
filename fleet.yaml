defaultNamespace: docnamer

helm:
  chart: ./helm/docnamer

  # ── Base values (no domain-specific config here) ───────────────────────────
  values:
    image:
      repository: ghcr.io/st7ma784/docnamer
      tag: "0.1.0"

    llm:
      model: llama3.2

    ollama:
      model: llama3.2

  # ── Secret values via Rancher ──────────────────────────────────────────────
  # Create a Rancher Secret in the docnamer namespace with key values.yaml:
  #
  #   imap:
  #     host: mail.example.com
  #     port: 993
  #     username: scanner@example.com
  #     password: <app-password>
  #     useSsl: "true"
  #     mailbox: INBOX
  #
  # auth.password is auto-generated on first install if not provided here.
  valuesFrom:
    - secretKeyRef:
        name: docnamer-credentials
        key: values.yaml
        optional: true   # allow first-boot before the secret exists

# ── Per-cluster ingress — domain read from the cluster label ────────────────
# Rancher patches each cluster with {"metadata":{"labels":{"domain":"..."}}}
# shortly after registration. Fleet substitutes ${cluster.metadata.labels.domain}
# before rendering the Helm chart, so no domain is hardcoded in Git.
targetCustomizations:
  - name: cluster-with-domain
    clusterSelector:
      matchExpressions:
        - key: domain
          operator: Exists
    helm:
      values:
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: "docnamer.${cluster.metadata.labels.domain}"
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: docnamer-tls
              hosts:
                - "docnamer.${cluster.metadata.labels.domain}"
