version: "3.9"

services:
  app:
    build: .
    image: docnamer:latest
    ports:
      - "8000:8000"
    volumes:
      - docnamer_data:/app/data
    environment:
      - DATA_DIR=/app/data
    env_file:
      - .env
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Uncomment to use a GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  docnamer_data:
  ollama_models:
