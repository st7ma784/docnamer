{{- if .Values.ingress.enabled -}}
{{- $host := include "docnamer.host" . -}}
{{- $paths := (first .Values.ingress.hosts).paths -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "docnamer.fullname" . }}
  labels:
    {{- include "docnamer.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.global.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          {{- range $paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "docnamer.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
{{- end }}
