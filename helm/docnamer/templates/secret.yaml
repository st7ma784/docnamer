apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docnamer.fullname" . }}-env
  labels:
    {{- include "docnamer.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_USERNAME: {{ .Values.auth.username | quote }}
  AUTH_PASSWORD: {{ .Values.auth.password | quote }}
  {{- $origins := .Values.allowedOrigins }}
  {{- if and (not $origins) .Values.ingress.enabled .Values.ingress.hosts }}
  {{- $proto := "https" }}
  {{- $origins = printf "%s://%s" $proto (first .Values.ingress.hosts).host }}
  {{- end }}
  ALLOWED_ORIGINS: {{ $origins | quote }}
  IMAP_HOST: {{ .Values.imap.host | quote }}
  IMAP_PORT: {{ .Values.imap.port | toString | quote }}
  IMAP_USERNAME: {{ .Values.imap.username | quote }}
  IMAP_PASSWORD: {{ .Values.imap.password | quote }}
  IMAP_USE_SSL: {{ .Values.imap.useSsl | quote }}
  IMAP_MAILBOX: {{ .Values.imap.mailbox | quote }}
  LLM_BASE_URL: {{ tpl .Values.llm.baseUrl . | quote }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  LLM_MAX_CHARS: {{ .Values.llm.maxChars | quote }}
  DATA_DIR: "/app/data"
