{{/*
  AUTH_PASSWORD resolution order:
    1. Explicitly set in values (values.yaml or Rancher Secret override)
    2. Already exists in the live cluster secret — preserve it across upgrades
    3. First install with no value — generate a random 24-char password

  This ensures the password is stable across `helm upgrade` runs and never
  needs to be manually set for a basic deployment.
*/}}
{{- $secretName := printf "%s-env" (include "docnamer.fullname" .) -}}
{{- $existing   := lookup "v1" "Secret" .Release.Namespace $secretName -}}

{{- $authPassword := .Values.auth.password -}}
{{- if not $authPassword -}}
  {{- if and $existing (index $existing.data "AUTH_PASSWORD") -}}
    {{- $authPassword = index $existing.data "AUTH_PASSWORD" | b64dec -}}
  {{- else -}}
    {{- $authPassword = randAlphaNum 24 -}}
  {{- end -}}
{{- end -}}

{{/*
  IMAP_* fields aren't set via values.yaml in most GitOps setups (Fleet has
  no safe way to inject a pre-existing Secret — see fleet.yaml). Instead they
  get hand-set on the live Secret post-deploy (kubectl edit/apply). Preserve
  those across `helm upgrade` the same way AUTH_PASSWORD is preserved, unless
  the chart values explicitly set a non-empty override.
*/}}
{{- $imapHost     := .Values.imap.host -}}
{{- $imapUsername := .Values.imap.username -}}
{{- $imapPassword := .Values.imap.password -}}
{{- if and $existing (not $imapHost) (index $existing.data "IMAP_HOST") -}}
  {{- $imapHost = index $existing.data "IMAP_HOST" | b64dec -}}
{{- end -}}
{{- if and $existing (not $imapUsername) (index $existing.data "IMAP_USERNAME") -}}
  {{- $imapUsername = index $existing.data "IMAP_USERNAME" | b64dec -}}
{{- end -}}
{{- if and $existing (not $imapPassword) (index $existing.data "IMAP_PASSWORD") -}}
  {{- $imapPassword = index $existing.data "IMAP_PASSWORD" | b64dec -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "docnamer.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_USERNAME: {{ .Values.auth.username | quote }}
  AUTH_PASSWORD: {{ $authPassword | quote }}
  {{- $origins := .Values.allowedOrigins }}
  {{- $host := include "docnamer.host" . }}
  {{- if and (not $origins) .Values.ingress.enabled $host }}
  {{- $origins = printf "https://%s" $host }}
  {{- end }}
  ALLOWED_ORIGINS: {{ $origins | quote }}
  IMAP_HOST: {{ $imapHost | quote }}
  IMAP_PORT: {{ .Values.imap.port | toString | quote }}
  IMAP_USERNAME: {{ $imapUsername | quote }}
  IMAP_PASSWORD: {{ $imapPassword | quote }}
  IMAP_USE_SSL: {{ .Values.imap.useSsl | quote }}
  IMAP_MAILBOX: {{ .Values.imap.mailbox | quote }}
  LLM_BASE_URL: {{ tpl .Values.llm.baseUrl . | quote }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  LLM_MAX_CHARS: {{ .Values.llm.maxChars | quote }}
  DATA_DIR: "/app/data"
  IMAGE_TAG: {{ .Values.image.tag | quote }}
